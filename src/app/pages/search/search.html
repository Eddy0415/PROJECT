<section class="page">
  <div class="head">
    <h2 class="title">Search</h2>

    @if (q()) {
      <p class="sub">Results for: <span class="q">"{{ q() }}"</span></p>
    } @else {
      <p class="sub">Type a product name in the navbar search.</p>
    }
  </div>

  <visible-products [filterName]="q()"></visible-products>
</section>
