<ui-modal [imageUrl]="'/hero/5.jpg'">
  <form class="auth" [formGroup]="form" (ngSubmit)="submit()">
    <h2 class="auth__title">Log in</h2>

    <div class="auth__fields">
      <ui-input
        [control]="form.controls.email"
        [error]="submitted() && form.controls.email.invalid"
        [placeholder]="'Email'"
        [type]="'email'"
        [icon]="'mail'"
      ></ui-input>

      <ui-input
        [control]="form.controls.password"
        [error]="submitted() && form.controls.password.invalid"
        [placeholder]="'Password'"
        [type]="'password'"
        [icon]="'lock'"
      ></ui-input>
    </div>

    @if (apiError()) {
      <p class="auth__error">{{ apiError() }}</p>
    }

    <div class="auth__actions">
      <ui-button [text]="isSubmitting() ? 'Logging in...' : 'Log in'" [type]="'submit'"></ui-button>

      <p class="auth__hint">
        Don't have an account?
        <a class="auth__link" (click)="goSignup()" href="javascript:void(0)">Sign up</a>
      </p>
    </div>
  </form>
</ui-modal>
