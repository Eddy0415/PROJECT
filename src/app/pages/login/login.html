<ui-modal [imageUrl]="'/hero/1.jpg'">
  <!-- popup overlay -->

  <form class="auth" [formGroup]="form" (ngSubmit)="submit()">
    <!-- form block -->
    <h2 class="title">Log in</h2>
    <!-- title -->

    <div class="fields">
      <!-- spacing container -->
      <ui-input
        [control]="form.controls.email"
        [placeholder]="'Email'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>

      <ui-input
        [control]="form.controls.password"
        [placeholder]="'Password'"
        [type]="'password'"
        [icon]="'lock'"
      ></ui-input>
    </div>

    <div class="actions">
      <ui-button [text]="'Log in'" [type]="'submit'"></ui-button>
      <!-- no logic yet -->
      <p class="hint">
        Don’t have an account?
        <a routerLink="/signup" class="link">Sign up</a>
      </p>
    </div>
  </form>
</ui-modal>
