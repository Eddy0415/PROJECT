<section class="hero" (mouseenter)="stopAutoPlay()" (mouseleave)="startAutoPlay()">
  <img class="bg" [src]="slides()[active()]" alt="Hero slide" />

  <div class="content">
    <h1>FIND ITEMS THAT MATCHES YOUR STYLE</h1>
    <p>
      Browse through our diverse range of meticulously crafted garments, designed to bring out your
      individuality and cater to your sense of style.
    </p>
    <ui-button [text]="'Shop Now'" (clicked)="nav.goProducts()"></ui-button>

    <div class="stats">
      <div class="stat">
        <div class="num">200+</div>
        <div class="lbl">International Brands</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="num">2,000+</div>
        <div class="lbl">High-Quality Products</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="num">30,000+</div>
        <div class="lbl">Happy Customers</div>
      </div>
    </div>
  </div>
</section>
