<div class="page">
  <app-hero-carousel></app-hero-carousel>

  <section class="products">
    <div class="products-bar">
      <h2>Best Selling</h2>

      <app-products-toolbar
        class="toolbar"
        [categories]="categories()"
        [selectedCategory]="selectedCategory()"
        [sortMode]="sortMode()"
        [minPrice]="minPrice()"
        [maxPrice]="maxPrice()"
        (selectedCategoryChange)="setCategory($event)"
        (sortModeChange)="setSortMode($event)"
        (minPriceChange)="setMinPrice($event)"
        (maxPriceChange)="setMaxPrice($event)"
      ></app-products-toolbar>
      <!-- why: real sorting/filtering UI -->
    </div>

    @if (loading()) {
      <div class="state">Loading products...</div>
    } @else if (error()) {
      <div class="state error">{{ error() }}</div>
    } @else {
      <div class="grid">
        @for (p of visibleProducts(); track p.id) {
          <app-product-card [product]="p"></app-product-card>
        }
      </div>
    }
  </section>
</div>
