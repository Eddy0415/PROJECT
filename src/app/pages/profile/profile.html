<section class="page">
  <div class="top">
    <a class="back" [routerLink]="['/']">← Back</a>
    <h1 class="title">Profile</h1>
  </div>

  <div class="headerCard">
    <div class="avatar">
      @if (user()?.imageUrl) {
        <img [src]="user()?.imageUrl!" alt="Profile" />
      } @else {
        <span class="initials">
          {{ (user()?.firstName?.[0] ?? 'U') + (user()?.lastName?.[0] ?? '') }}
        </span>
      }
    </div>

    <div class="meta">
      <div class="name">{{ fullName() }}</div>
      <div class="email">{{ user()?.email ?? 'No email' }}</div>
    </div>
  </div>

  <div class="layout">
    <profile-sidebar [active]="active()" (action)="onSidebarAction($event)"></profile-sidebar>

    @if (active() === 'edit') {
      <profile-edit [user]="user()"></profile-edit>
    }
  </div>
</section>
