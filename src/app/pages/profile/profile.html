<section class="page">
  <ui-breadcrumb></ui-breadcrumb>

  <h1 class="title">Account</h1>

  <div class="layout">
    <profile-sidebar [active]="active()" (action)="onSidebarAction($event)"></profile-sidebar>

    @if (active() === 'edit') {
      <profile-edit [user]="user()"></profile-edit>
    }
    @if (active() === 'payments') {
      <div class="coming-soon">
        <span class="material-icons coming-soon__icon">credit_card</span>
        <p class="coming-soon__text">Payment options coming soon.</p>
      </div>
    }
  </div>
</section>
