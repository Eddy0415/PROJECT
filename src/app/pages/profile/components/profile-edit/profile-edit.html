<section class="panel">
  <h2 class="panel__title">Personal Details</h2>

  @if (apiError()) {
    <p class="panel__error">{{ apiError() }}</p>
  }

  <form class="form" [formGroup]="form" (ngSubmit)="update()">

    <!-- Avatar picker -->
    <div class="form__avatar-row">
      <div class="form__avatar" role="button" tabindex="0" (click)="fileInput.click()" (keydown.enter)="fileInput.click()" (keydown.space)="fileInput.click()">
        @if (previewUrl()) {
          <img class="form__avatar-img" [src]="previewUrl()!" alt="Profile preview" />
        } @else if (user()?.imageUrl) {
          <img class="form__avatar-img" [src]="user()!.imageUrl!" alt="Current profile" />
        } @else {
          <span class="form__avatar-initials">
            {{ (user()?.firstName?.[0] ?? 'U') + (user()?.lastName?.[0] ?? '') }}
          </span>
        }
        <div class="form__avatar-overlay">
          <span class="material-icons">photo_camera</span>
        </div>
      </div>
      <input #fileInput type="file" accept="image/*" class="form__file-hidden" (change)="onFileSelected($event)" />
    </div>

    <div class="form__row2">
      <ui-input
        [control]="form.controls.firstName"
        [error]="submitted() && form.controls.firstName.invalid"
        [placeholder]="'First Name'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>
      <ui-input
        [control]="form.controls.lastName"
        [error]="submitted() && form.controls.lastName.invalid"
        [placeholder]="'Last Name'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>
    </div>

    <div class="form__row2">
      <ui-input
        [control]="form.controls.username"
        [error]="submitted() && form.controls.username.invalid"
        [placeholder]="'Username'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>
      <ui-input
        [control]="form.controls.email"
        [error]="submitted() && form.controls.email.invalid"
        [placeholder]="'Email Address'"
        [type]="'email'"
        [icon]="'mail'"
      ></ui-input>
    </div>

    <div class="form__row2">
      <ui-input
        [control]="form.controls.dateOfBirth"
        [placeholder]="'Date of Birth'"
        [type]="'date'"
        [icon]="'calendar'"
      ></ui-input>
      <ui-input
        [control]="form.controls.role"
        [placeholder]="'Role (optional)'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>
    </div>

    <h2 class="panel__title">Change Password</h2>

    <div class="form__row2">
      <ui-input
        [control]="form.controls.password"
        [error]="submitted() && (form.controls.password.invalid || passwordMismatch())"
        [placeholder]="'New Password (optional)'"
        [type]="'password'"
        [icon]="'lock'"
      ></ui-input>
      <ui-input
        [control]="form.controls.confirmPassword"
        [error]="submitted() && (form.controls.confirmPassword.invalid || passwordMismatch())"
        [placeholder]="'Confirm New Password'"
        [type]="'password'"
        [icon]="'lock'"
      ></ui-input>
    </div>

    @if (passwordMismatch()) {
      <p class="panel__error">Passwords do not match.</p>
    }

    <div class="form__actions">
      <ui-button
        [text]="saveState() === 'saving' ? 'Updating...' : saveState() === 'success' ? 'Updated!' : 'Update'"
        [type]="'submit'"
        [disabled]="isSaving()"
        [variant]="saveState() === 'success' ? 'success' : 'default'"
      ></ui-button>

      <ui-button
        [text]="isDeleting() ? 'Deleting...' : 'Delete Account'"
        [type]="'button'"
        [disabled]="isDeleting()"
        [variant]="'danger'"
        (clicked)="deleteAccount()"
      ></ui-button>
    </div>

  </form>
</section>
