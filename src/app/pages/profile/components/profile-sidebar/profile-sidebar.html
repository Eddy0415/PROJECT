<aside class="side">
  <ui-pill
    [label]="'Edit profile'"
    [active]="active() === 'edit'"
    (clicked)="action.emit('edit')"
  ></ui-pill>

  <ui-pill
    [label]="'Payment options'"
    [active]="active() === 'payments'"
    (clicked)="action.emit('payments')"
  ></ui-pill>

  <ui-pill
    [label]="'Logout'"
    [active]="false"
    class="logout-pill"
    (clicked)="action.emit('logout')"
  ></ui-pill>
</aside>
