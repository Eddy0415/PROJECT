<ui-modal [imageUrl]="'/hero/1.jpg'">
  <form class="auth" [formGroup]="form" (ngSubmit)="submit()">
    <h2 class="auth__title">Sign Up</h2>

    <div class="auth__fields">
      <div class="auth__row2">
        <ui-input
          [control]="form.controls.firstName"
          [error]="submitted() && form.controls.firstName.invalid"
          [placeholder]="'First Name'"
          [type]="'text'"
          [icon]="'user'"
        ></ui-input>
        <ui-input
          [control]="form.controls.lastName"
          [error]="submitted() && form.controls.lastName.invalid"
          [placeholder]="'Last Name'"
          [type]="'text'"
          [icon]="'user'"
        ></ui-input>
      </div>

      <ui-input
        [control]="form.controls.username"
        [error]="submitted() && form.controls.username.invalid"
        [placeholder]="'Username'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>

      <ui-input
        [control]="form.controls.email"
        [error]="submitted() && form.controls.email.invalid"
        [placeholder]="'Email Address'"
        [type]="'email'"
        [icon]="'mail'"
      ></ui-input>

      <div class="auth__row2">
        <ui-input
          [control]="form.controls.password"
          [error]="submitted() && (form.controls.password.invalid || passwordMismatch())"
          [placeholder]="'Password'"
          [type]="'password'"
          [icon]="'lock'"
        ></ui-input>
        <ui-input
          [control]="form.controls.confirmPassword"
          [error]="submitted() && (form.controls.confirmPassword.invalid || passwordMismatch())"
          [placeholder]="'Confirm Password'"
          [type]="'password'"
          [icon]="'lock'"
        ></ui-input>
      </div>

      @if (passwordMismatch()) {
        <p class="auth__error">Passwords do not match.</p>
      }
    </div>

    @if (apiError()) {
      <p class="auth__error">{{ apiError() }}</p>
    }

    <div class="auth__actions">
      <ui-button [text]="isSubmitting() ? 'Creating...' : 'Create Account'" [type]="'submit'"></ui-button>

      <p class="auth__hint">
        Already have an account?
        <a class="auth__link" (click)="goLogin()" href="javascript:void(0)">Login</a>
      </p>
    </div>
  </form>
</ui-modal>
