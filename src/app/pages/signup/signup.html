<ui-modal [imageUrl]="'/hero/1.jpg'">
  <form class="auth" [formGroup]="form" (ngSubmit)="submit()">
    <h2 class="title">Sign Up</h2>

    <div class="fields">
      <div class="row2">
        <ui-input
          [control]="form.controls.firstName"
          [submitted]="submitted()"
          [placeholder]="'First Name'"
          [type]="'text'"
          [icon]="'user'"
        ></ui-input>

        <ui-input
          [control]="form.controls.lastName"
          [submitted]="submitted()"
          [placeholder]="'Last Name'"
          [type]="'text'"
          [icon]="'user'"
        ></ui-input>
      </div>

      <ui-input
        [control]="form.controls.username"
        [submitted]="submitted()"
        [placeholder]="'Username'"
        [type]="'text'"
        [icon]="'user'"
      ></ui-input>

      <ui-input
        [control]="form.controls.email"
        [submitted]="submitted()"
        [placeholder]="'Email Address'"
        [type]="'email'"
        [icon]="'mail'"
      ></ui-input>

      <div class="row2">
        <ui-input
          [control]="form.controls.password"
          [submitted]="submitted()"
          [placeholder]="'Password'"
          [type]="'password'"
          [icon]="'lock'"
        ></ui-input>

        <ui-input
          [control]="form.controls.confirmPassword"
          [submitted]="submitted()"
          [placeholder]="'Confirm Password'"
          [type]="'password'"
          [icon]="'lock'"
        ></ui-input>
      </div>
    </div>

    <div class="actions">
      @if (apiError()) {
        <p class="error">{{ apiError() }}</p>
      }

      <ui-button [text]="'Create Account'" [type]="'submit'"></ui-button>

      <p class="hint">
        Already have an account?
        <a routerLink="/login" class="link">Login</a>
      </p>
    </div>
  </form>
</ui-modal>
