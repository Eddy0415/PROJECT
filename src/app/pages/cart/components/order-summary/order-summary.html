<aside class="summary">
  <h2 class="summary__title">Order Summary</h2>

  <div class="summary__row">
    <span>Subtotal</span>
    <strong>{{ subtotal() | currency: 'USD' }}</strong>
  </div>

  <div class="summary__row">
    <span>Delivery Fee</span>
    <strong>$15</strong>
  </div>

  <div class="summary__row summary__row--total">
    <span>Total</span>
    <strong>{{ (subtotal() + 15) | currency: 'USD' }}</strong>
  </div>

  <div class="summary__cta">
    <ui-button
      [text]="btnLabel()"
      [type]="'button'"
      [variant]="btnVariant()"
      (clicked)="checkout.emit()"
    ></ui-button>
  </div>
</aside>
