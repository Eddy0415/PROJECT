<section class="cart">
  <ui-breadcrumb></ui-breadcrumb>
  <h1 class="cart__title">Your cart</h1>

  @if (!hasItems()) {
    <div class="cart__empty">
      <p>Your cart is empty.</p>
      <ui-button [text]="'Shop Now'" [type]="'button'" (clicked)="goHome()"></ui-button>
    </div>
  } @else {
    <div class="cart__grid">
      <cart-table
        [lines]="lines()"
        (removeClick)="remove($event)"
        (incClick)="inc($event)"
        (decClick)="dec($event)"
      ></cart-table>

      <cart-order-summary
        [subtotal]="subtotal()"
        [canOrder]="canOrder()"
        [placingOrder]="placingOrder()"
        [orderSuccess]="orderSuccess()"
        (checkout)="checkout()"
      ></cart-order-summary>
    </div>
  }

  @if (orderError()) {
    <div class="cart__error">{{ orderError() }}</div>
  }
</section>
