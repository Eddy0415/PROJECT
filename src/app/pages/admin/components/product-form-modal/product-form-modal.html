<div class="backdrop" (click)="cancel()"></div>

<div class="modal">
  <h2 class="modal__title">{{ isEdit ? 'Edit Product' : 'Add Product' }}</h2>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">

    <div class="form__field" [class.form__field--error]="err(form.controls.title)">
      <label class="form__label">Title</label>
      <input class="form__input" formControlName="title" placeholder="Product title" />
    </div>

    <div class="form__row2">
      <div class="form__field" [class.form__field--error]="err(form.controls.price)">
        <label class="form__label">Price ($)</label>
        <input class="form__input" formControlName="price" type="number" step="0.01" min="0.01" placeholder="0.00" />
      </div>
      <div class="form__field" [class.form__field--error]="err(form.controls.category)">
        <label class="form__label">Category</label>
        <input class="form__input" formControlName="category" placeholder="e.g. electronics" />
      </div>
    </div>

    <div class="form__field" [class.form__field--error]="err(form.controls.image)">
      <label class="form__label">Image URL</label>
      <input class="form__input" formControlName="image" placeholder="https://..." />
    </div>

    <div class="form__field" [class.form__field--error]="err(form.controls.description)">
      <label class="form__label">Description</label>
      <textarea class="form__input form__textarea" formControlName="description" placeholder="Product description..." rows="4"></textarea>
    </div>

    <div class="form__actions">
      <button type="button" class="btn btn--ghost" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn--primary">
        {{ isEdit ? 'Save changes' : 'Add product' }}
      </button>
    </div>

  </form>
</div>
