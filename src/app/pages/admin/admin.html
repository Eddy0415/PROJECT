<section class="page">
  <ui-breadcrumb></ui-breadcrumb>

  <h1 class="title">Admin</h1>

  <div class="layout">
    <page-sidebar
      [items]="sidebarItems"
      [active]="active()"
      (action)="onSidebarAction($event)"
    ></page-sidebar>

    <div class="content">

      @if (active() === 'products') {
        <products-dashboard></products-dashboard>
      }

      @if (active() === 'users') {
        <div class="coming-soon">
          <span class="material-icons coming-soon__icon">group</span>
          <p class="coming-soon__text">User management coming soon.</p>
        </div>
      }

    </div>
  </div>
</section>
