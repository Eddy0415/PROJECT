<div class="admin">
  <admin-sidebar [active]="'products'"></admin-sidebar>

  <main class="content">
    <header class="top">
      <div class="title">
        <h2>Products</h2>
        <p>Manage products with sorting, filtering, pagination, and inline editing.</p>
      </div>

      @if (loading()) {
        <div class="badge">Loading…</div>
      }
    </header>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <div class="gridCard">
      <ag-grid-angular
        class="ag-theme-quartz"
        style="width: 100%; height: 620px"
        [rowData]="rowData()"
        [columnDefs]="colDefs"
        [gridOptions]="gridOptions"
      />
    </div>
  </main>
</div>
