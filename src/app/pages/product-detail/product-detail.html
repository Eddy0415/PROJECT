<div class="page">
  @if (loading()) {
    <div class="state">Loading product...</div>
  } @else if (error()) {
    <div class="state state--error">{{ error() }}</div>
  } @else if (product()) {
    <ui-breadcrumb></ui-breadcrumb>

    <detail-product-card
      [product]="product()!"
      [qty]="qty()"
      (decQty)="decQty()"
      (incQty)="incQty()"
      (addToCart)="addToCart()"
    ></detail-product-card>

    <section class="similar">
      <h2 class="similar__title">You might also like</h2>
      <visible-products
        [filterCategory]="product()!.category"
        [showToolbar]="false"
      ></visible-products>
    </section>
  } @else {
    <div class="state state--error">Product not found.</div>
  }
</div>
