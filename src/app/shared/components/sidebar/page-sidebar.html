<aside class="side">
  @for (item of items(); track item.key) {
    <ui-pill
      [label]="item.label"
      [active]="!item.variant && active() === item.key"
      [variant]="item.variant ?? 'default'"
      (clicked)="item.variant !== 'disabled' && action.emit(item.key)"
    ></ui-pill>
  }
</aside>
