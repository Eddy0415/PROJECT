<label class="field" [class.field--error]="showError()">
  <span class="field__icon material-icons">{{ iconName() }}</span>

  <input
    class="field__input"
    [type]="inputType()"
    [placeholder]="placeholder()"
    [formControl]="control()"
  />

  @if (type() === 'password') {
    <button type="button" class="field__toggle" (click)="toggleVisible()">
      <span class="material-icons">{{ visible() ? 'visibility' : 'visibility_off' }}</span>
    </button>
  }
</label>
