<header class="nav">
  <div class="inner">
    <a class="logo" [routerLink]="['/']">Item Store</a>

    <div class="search">
      <span class="search__icon material-icons">search</span>
      <input
        class="search__input"
        type="text"
        [value]="searchText()"
        (input)="onSearchInput($any($event.target).value)"
        (keydown.enter)="submitSearch()"
        placeholder="Search for products..."
      />
    </div>

    <nav class="links">
      <a class="links__item" [routerLink]="['/']">Products</a>
      <a class="links__item" [routerLink]="['/']">About Us</a>
    </nav>

    <div class="actions">
      <a class="actions__cart" [routerLink]="['/cart']" aria-label="Cart">
        <span class="material-icons">shopping_cart</span>
      </a>

      @if (!isAuthenticated()) {
        <ui-button [text]="'Log in'" [type]="'button'" [routerLink]="['/login']"></ui-button>
      } @else {
        <button class="actions__profile" type="button" (click)="goProfile()" aria-label="Profile">
          <span class="material-icons actions__profile-icon">account_circle</span>
          @if (currentUser()?.imageUrl) {
            <img class="actions__avatar" [src]="currentUser()?.imageUrl!" alt="Profile" />
          } @else {
            <span class="actions__initials">
              {{ (currentUser()?.firstName?.[0] ?? 'U') + (currentUser()?.lastName?.[0] ?? '') }}
            </span>
          }
        </button>
      }
    </div>
  </div>
</header>
