@if (!isAuthenticated()) {
  <ui-button [text]="'Log in'" [type]="'button'" routerLink="/login"></ui-button>
} @else {
  <button class="pfp" type="button" (click)="goProfile()" aria-label="Profile">
    <span class="material-icons pfp__icon">account_circle</span>
    @if (currentUser()?.imageUrl) {
      <img class="pfp__avatar" [src]="currentUser()?.imageUrl!" alt="Profile" />
    } @else {
      <span class="pfp__initials">
        {{ (currentUser()?.firstName?.[0] ?? 'U') + (currentUser()?.lastName?.[0] ?? '') }}
      </span>
    }
  </button>
}
