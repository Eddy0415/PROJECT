<div class="card">
  <div class="img">
    <img [src]="product().image" [alt]="product().title" />
  </div>

  <div class="body">
    <div class="title" title="{{ product().title }}">{{ product().title }}</div>

    <div class="row">
      <span class="cat">{{ product().category }}</span>
      <span class="price">{{ product().price | currency }}</span>
    </div>
  </div>
</div>
