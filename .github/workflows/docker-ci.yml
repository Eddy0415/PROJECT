name: Docker CI

on:
  push:
  workflow_dispatch:

jobs:
  docker-build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t project-app:latest .

      - name: Run container
        run: |
          docker run -d --name project-app-container -p 8080:80 project-app:latest
          sleep 5

      - name: Verify container is running
        run: docker ps --filter "name=project-app-container" --filter "status=running"

      - name: Verify application responds
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8080

      - name: Show container logs on failure
        if: failure()
        run: docker logs project-app-container
